---
- name: Ensure DEB download directory exists
  ansible.builtin.file:
    path: "{{ desktop_download_dir }}"
    state: directory
    mode: "0755"

- name: Ensure local DEB definitions exist on the control node
  ansible.builtin.stat:
    path: "{{ item.local_src }}"
    checksum_algorithm: "{{ item.local_checksum_algorithm | default('sha256') }}"
  loop: "{{ desktop_deb_apps | default([], true) }}"
  loop_control:
    label: "{{ item.name }}"
  register: desktop_local_deb_stats
  delegate_to: localhost
  become: false
  when:
    - item.enabled | default(true) | bool
    - item.local_src is defined

- name: Fail if a required local DEB is missing
  ansible.builtin.assert:
    that:
      - item.stat.exists
      - item.stat.isreg
    fail_msg: >-
      Local DEB for {{ item.item.name }} was not found at {{ item.item.local_src }}.
      Put the vendor file there and rerun the playbook.
  loop: "{{ desktop_local_deb_stats.results | default([]) }}"
  loop_control:
    label: "{{ item.item.name }}"
  when:
    - item.skipped is not defined or not item.skipped

- name: Validate local DEB checksum when provided
  ansible.builtin.assert:
    that:
      - item.stat.checksum == item.item.local_checksum
    fail_msg: >-
      Local DEB checksum mismatch for {{ item.item.name }}.
      Expected {{ item.item.local_checksum }}, got {{ item.stat.checksum }}.
  loop: "{{ desktop_local_deb_stats.results | default([]) }}"
  loop_control:
    label: "{{ item.item.name }}"
  when:
    - item.skipped is not defined or not item.skipped
    - item.item.local_checksum is defined

- name: Download application DEB packages
  ansible.builtin.get_url:
    url: "{{ item.url }}"
    dest: "{{ desktop_download_dir }}/{{ item.filename | default(item.name ~ '.deb') }}"
    checksum: "{{ item.checksum | default(omit) }}"
    mode: "0644"
  loop: "{{ desktop_deb_apps | default([], true) }}"
  loop_control:
    label: "{{ item.name }}"
  when:
    - item.enabled | default(true) | bool
    - item.local_src is not defined

- name: Copy local DEB artifacts to managed hosts
  ansible.builtin.copy:
    src: "{{ item.local_src }}"
    dest: "{{ desktop_download_dir }}/{{ item.filename | default(item.name ~ '.deb') }}"
    mode: "0644"
  loop: "{{ desktop_deb_apps | default([], true) }}"
  loop_control:
    label: "{{ item.name }}"
  when:
    - item.enabled | default(true) | bool
    - item.local_src is defined

- name: Install DEB applications
  ansible.builtin.apt:
    deb: "{{ desktop_download_dir }}/{{ item.filename | default(item.name ~ '.deb') }}"
    state: present
  loop: "{{ desktop_deb_apps | default([], true) }}"
  loop_control:
    label: "{{ item.name }}"
  when: item.enabled | default(true) | bool

- name: Install desktop launchers for DEB applications
  ansible.builtin.template:
    src: app.desktop.j2
    dest: "/usr/share/applications/{{ item.desktop.filename | default(item.command_name | default(item.name)) }}.desktop"
    mode: "0644"
  loop: "{{ desktop_deb_apps | default([], true) }}"
  loop_control:
    label: "{{ item.name }}"
  when:
    - item.enabled | default(true) | bool
    - item.desktop is defined

- name: Remove superseded desktop launchers for DEB applications
  ansible.builtin.file:
    path: "/usr/share/applications/{{ item.1 }}"
    state: absent
  loop: "{{ desktop_deb_apps | default([], true) | subelements('desktop.remove_filenames', skip_missing=True) }}"
  loop_control:
    label: "{{ item.0.name }} -> {{ item.1 }}"
  when:
    - item.0.enabled | default(true) | bool
    - item.0.desktop is defined
